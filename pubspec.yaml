name: poppy
description: Poppy — where every day finds its petal. Privacy-first Flutter journaling app with offline-first synchronization and client-side encryption.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # ──────────────────────────────────────────────────────────────
  # Backend & Cloud
  # ──────────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ──────────────────────────────────────────────────────────────
  # State Management
  # ──────────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ──────────────────────────────────────────────────────────────
  # Local Storage & Offline Support
  # ──────────────────────────────────────────────────────────────
  sqflite: ^2.3.3
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.0.5
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.4.0

  # ──────────────────────────────────────────────────────────────
  # Security & Cryptography
  # ──────────────────────────────────────────────────────────────
  crypto: ^3.0.3
  cryptography: ^2.9.0

  # ──────────────────────────────────────────────────────────────
  # Media & File Handling
  # ──────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.3.0
  file_picker: ^8.1.2
  share_plus: ^10.0.2

  # ──────────────────────────────────────────────────────────────
  # Notifications
  # ──────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.4
  flutter_timezone: ^5.1.0
  timezone: ^0.9.4

  # ──────────────────────────────────────────────────────────────
  # User Interface
  # ──────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  gap: ^3.0.1
  modal_bottom_sheet: ^3.0.0
  shimmer: ^3.0.0
  dropdown_button2: ^3.1.0
  flutter_bidi_text: ^1.1.1

  # ──────────────────────────────────────────────────────────────
  # Utilities
  # ──────────────────────────────────────────────────────────────
  intl: ^0.20.3
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/