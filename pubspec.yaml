name: poppy
description: Poppy — where every day finds its petal. A calm, personal diary app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Backend ──────────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── State management ─────────────────────────────────────────
  provider: ^6.1.2

  # ── Secure storage (PIN lock) ─────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Image picking & display ───────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ── File handling (import / export) ───────────────────────────
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  flutter_image_compress: ^2.3.0

  # ── Notifications ─────────────────────────────────────────────
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # ── Icons ──────────────────────────────────────────────────
  iconsax: ^0.0.8

  # ── Encryption (PIN hashing) ──────────────────────────────────
  crypto: ^3.0.3
  cryptography: ^2.9.0

  # ── Date & text utilities ─────────────────────────────────────
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # ── UI niceties ───────────────────────────────────────────────
  flutter_svg: ^2.0.10+1       # for the Poppy logo SVG
  gap: ^3.0.1                  # clean spacing widget
  modal_bottom_sheet: ^3.0.0   # smooth bottom sheets
  shimmer: ^3.0.0              # loading skeleton effect
  dropdown_button2: ^3.1.0
  flutter_bidi_text: ^1.1.1
  package_info_plus: ^9.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/